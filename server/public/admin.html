<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Matrex — Device Approvals</title>
<style>
  :root{--bg:#F5F6FA;--white:#fff;--gray-200:#E4E7EC;--gray-500:#667085;--gray-900:#101828;
    --blue-600:#2B59E1;--green-700:#027A48;--green-50:#ECFDF3;--red-600:#D92D20;--red-50:#FEF3F2;
    --amber-700:#B54708;--amber-50:#FFFAEB;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--gray-900);padding:24px}
  .wrap{max-width:720px;margin:0 auto}
  h1{font-size:20px;margin-bottom:4px}
  .sub{font-size:13px;color:var(--gray-500);margin-bottom:20px}
  .keybar{display:flex;gap:8px;margin-bottom:20px}
  input{flex:1;padding:10px 12px;border:1.5px solid var(--gray-200);border-radius:8px;font-size:14px;font-family:inherit}
  button{padding:10px 16px;border-radius:8px;border:none;background:var(--blue-600);color:#fff;font-weight:600;cursor:pointer;font-size:13px;font-family:inherit}
  button.secondary{background:var(--gray-200);color:var(--gray-900)}
  button.danger{background:var(--red-50);color:var(--red-600)}
  button.ok{background:var(--green-50);color:var(--green-700)}
  .card{background:var(--white);border:1.5px solid var(--gray-200);border-radius:12px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px}
  .name{font-weight:700;font-size:14px}
  .meta{font-size:12px;color:var(--gray-500);margin-top:2px}
  .pill{font-size:11px;font-weight:800;padding:3px 10px;border-radius:100px;text-transform:uppercase;letter-spacing:.4px}
  .pill.PENDING{background:var(--amber-50);color:var(--amber-700)}
  .pill.APPROVED{background:var(--green-50);color:var(--green-700)}
  .pill.REVOKED{background:var(--red-50);color:var(--red-600)}
  .acts{margin-left:auto;display:flex;gap:6px}
  .empty{color:var(--gray-500);font-size:13px;padding:20px;text-align:center}
  h2{font-size:16px;margin:28px 0 4px}
  select{padding:10px 12px;border:1.5px solid var(--gray-200);border-radius:8px;font-size:14px;font-family:inherit;background:var(--white)}
  .note-card{background:var(--white);border:1.5px solid var(--gray-200);border-radius:10px;padding:10px 12px;margin-bottom:8px}
  .note-cat{font-weight:700;font-size:13px}
  .note-text{font-size:13px;color:var(--gray-500);margin-top:2px}
  .note-meta{font-size:11px;color:var(--gray-500);margin-top:4px}
  .field-row{display:flex;gap:10px;font-size:13px;padding:4px 0}
  .field-k{color:var(--gray-500);min-width:110px;flex-shrink:0}
  .field-v{font-weight:600}
</style>
</head>
<body>
<div class="wrap">
  <h1>Device Approvals</h1>
  <div class="sub">Only approved devices can write scans to the server. New phones show up here as Pending.</div>
  <div class="keybar">
    <input id="key" type="password" placeholder="Admin key">
    <button onclick="saveKey()">Connect</button>
  </div>
  <div id="list"></div>

  <h2>Part Lookup</h2>
  <div class="sub">Look up any registered part by its 10-character unique ID, view its notes, or add one.</div>
  <div class="keybar">
    <input id="partId" placeholder="Unique ID" style="text-transform:uppercase">
    <button onclick="lookupPart()">Search</button>
  </div>
  <div id="partResult"></div>
</div>
<script>
const $=id=>document.getElementById(id);
let KEY=localStorage.getItem('mx_admin_key')||'';
$('key').value=KEY;

function saveKey(){KEY=$('key').value.trim();localStorage.setItem('mx_admin_key',KEY);load();}

async function api(path,opts){
  const r=await fetch(path,Object.assign({headers:{'X-Admin-Key':KEY,'Content-Type':'application/json'}},opts||{}));
  if(!r.ok)throw new Error('HTTP '+r.status);
  return r.json();
}

async function load(){
  if(!KEY){$('list').innerHTML='<div class="empty">Enter the admin key to see devices.</div>';return;}
  try{
    const devices=await api('/admin/api/devices');
    if(!devices.length){$('list').innerHTML='<div class="empty">No devices have registered yet.</div>';return;}
    $('list').innerHTML=devices.map(d=>`
      <div class="card">
        <div>
          <div class="name">${esc(d.device_name||'(unnamed)')}</div>
          <div class="meta">${esc(d.device_id)} · first seen ${fmt(d.first_seen)} · last seen ${fmt(d.last_seen)}</div>
        </div>
        <span class="pill ${d.status}">${d.status}</span>
        <div class="acts">
          ${d.status!=='APPROVED'?`<button class="ok" onclick="act('${esc(d.device_id)}','approve')">Approve</button>`:''}
          ${d.status!=='REVOKED'?`<button class="danger" onclick="act('${esc(d.device_id)}','revoke')">Revoke</button>`:''}
        </div>
      </div>`).join('');
  }catch(e){$('list').innerHTML='<div class="empty">Wrong key, or server unreachable.</div>';}
}
async function act(id,action){await api(`/admin/api/devices/${encodeURIComponent(id)}/${action}`,{method:'POST'});load();}
function esc(s){return String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function fmt(iso){return iso?new Date(iso).toLocaleString():'—';}

load();
setInterval(load,4000);

// ── PART LOOKUP + NOTES ─────────────────────────────────────
const NOTE_CATEGORIES=[
  ['DAMAGE','Damage'],['DEFECT','Defect'],['SCRATCH','Scratch'],['BENT','Bent / Warped'],
  ['INCORRECT','Incorrect Spec'],['DENT','Dent'],['COLOUR_MISMATCH','Colour Mismatch'],
  ['MISSING_COMPONENT','Missing Component'],['OTHER','Other (describe below)']
];
const catLabel=Object.fromEntries(NOTE_CATEGORIES);
let currentPartId=null;

async function lookupPart(){
  const id=$('partId').value.trim().toUpperCase();
  if(!id){$('partResult').innerHTML='';return;}
  if(!KEY){$('partResult').innerHTML='<div class="empty">Enter the admin key above first.</div>';return;}
  currentPartId=id;
  $('partResult').innerHTML='<div class="empty">Looking up…</div>';
  try{
    const data=await api(`/admin/api/parts/${encodeURIComponent(id)}`);
    if(!data.found){$('partResult').innerHTML='<div class="empty">No part registered with that ID.</div>';return;}
    renderPart(data);
  }catch(e){$('partResult').innerHTML='<div class="empty">Lookup failed — wrong key, or server unreachable.</div>';}
}
$('partId').addEventListener('keydown',e=>{if(e.key==='Enter')lookupPart();});

function renderPart(data){
  const idx=data.index,d=data.detail||{};
  const statusPill=idx.void==='Yes'?'<span class="pill REVOKED">VOID</span>':idx.scanned==='Yes'?'<span class="pill APPROVED">SCANNED</span>':'<span class="pill PENDING">NOT SCANNED</span>';
  const fields=[['Department',idx.department],['Batch',d.batch],['Sheet Name',d.sheet_name],['Project',d.project],
    ['Floor',d.floor],['Tag',d.tag],['Type',d.part_type],['Size',[d.width,d.height].filter(Boolean).join(' X ')],
    ['Qty',d.qty],['Colour',d.colour],['Scanned At',fmt(idx.scanned_at)],['Scanned By',idx.scanned_by_device]]
    .filter(([,v])=>v).map(([k,v])=>`<div class="field-row"><span class="field-k">${esc(k)}</span><span class="field-v">${esc(v)}</span></div>`).join('');

  $('partResult').innerHTML=`
    <div class="card" style="flex-direction:column;align-items:stretch">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div class="name">${esc(idx.unique_id)}</div>${statusPill}
      </div>
      ${fields}
    </div>
    <h2 style="margin-top:16px">Notes</h2>
    <div id="notesArea"></div>
    <div class="keybar" style="margin-top:10px">
      <select id="noteCat">${NOTE_CATEGORIES.map(([v,l])=>`<option value="${v}">${esc(l)}</option>`).join('')}</select>
      <input id="noteTxt" placeholder="Details (required for Other)">
      <button onclick="addPartNote()">Add Note</button>
    </div>`;
  renderNotes(data.notes);
}
function renderNotes(notes){
  $('notesArea').innerHTML=!notes.length?'<div class="empty">No notes yet.</div>':notes.map(n=>`
    <div class="note-card">
      <div class="note-cat">${esc(catLabel[n.category]||n.category)}</div>
      ${n.note?`<div class="note-text">${esc(n.note)}</div>`:''}
      <div class="note-meta">${esc(n.device||'admin')} · ${fmt(n.created_at)}</div>
    </div>`).join('');
}
async function addPartNote(){
  const category=$('noteCat').value,note=$('noteTxt').value.trim();
  if(category==='OTHER'&&!note){alert('Details are required for "Other".');return;}
  try{
    const data=await api('/admin/api/parts/notes',{method:'POST',body:JSON.stringify({unique_id:currentPartId,category,note,device:'ADMIN'})});
    $('noteTxt').value='';
    renderNotes(data.notes);
  }catch(e){alert('Could not add note — check the admin key and try again.');}
}
</script>
</body>
</html>
