<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Scan Test 1 — html5-qrcode</title>
<style>
body{margin:0;background:#0f0f0f;color:#fff;font-family:system-ui,sans-serif;padding:16px}
h2{font-size:16px;margin:0 0 4px;color:#60a5fa}
.sub{font-size:11px;color:#6b7280;margin-bottom:12px}
#reader{width:100%;border-radius:10px;overflow:hidden;background:#1a1a1a}
#log{background:#111;border-radius:8px;padding:10px;margin-top:12px;font-size:12px;font-family:monospace;min-height:80px;max-height:180px;overflow-y:auto;border:1px solid #222}
#result{background:#052e16;border:1.5px solid #16a34a;border-radius:8px;padding:12px;margin-top:12px;display:none}
#result .label{font-size:11px;color:#4ade80;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
#result .val{font-size:14px;color:#fff;word-break:break-all;line-height:1.6}
.badge{display:inline-block;background:#1d4ed8;color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;margin-bottom:8px}
</style>
</head>
<body>
<div class="badge">TEST 1 of 4</div>
<h2>html5-qrcode Library</h2>
<div class="sub">Uses html5-qrcode — best PDF417 support on Android. Camera starts automatically.</div>
<div id="reader"></div>
<div id="result">
  <div class="label">✓ Scanned Successfully</div>
  <div class="val" id="resultText"></div>
</div>
<div id="log"><span style="color:#6b7280">Starting…</span></div>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
const log=t=>{const el=document.getElementById('log');const line=document.createElement('div');line.style.color=t.startsWith('✓')?'#4ade80':t.startsWith('✗')?'#f87171':'#d1d5db';line.textContent=new Date().toLocaleTimeString()+' '+t;el.appendChild(line);el.scrollTop=el.scrollHeight;console.log(t);};

let lastVal='', lastTime=0;

function onScan(text, result){
  const now=Date.now();
  if(text===lastVal && now-lastTime<3000) return;
  lastVal=text; lastTime=now;
  log('✓ DECODED: '+text.substring(0,80));
  const el=document.getElementById('result');
  el.style.display='block';
  document.getElementById('resultText').textContent=text;
  // vibrate on success
  if(navigator.vibrate) navigator.vibrate([60,30,60]);
}

function onError(err){
  // NotFoundException fires every frame when no barcode visible — ignore
  if(String(err).toLowerCase().includes('notfound')||String(err).toLowerCase().includes('no qr')) return;
  // Only log real errors
  log('✗ '+String(err).substring(0,60));
}

async function start(){
  log('html5-qrcode library loaded');
  try{
    const html5QrCode = new Html5Qrcode("reader");
    const config={
      fps:15,
      qrbox:{width:280, height:120}, // wide box suits PDF417
      rememberLastUsedCamera:true,
      supportedScanTypes:[
        Html5QrcodeScanType.SCAN_TYPE_CAMERA
      ]
    };
    // formatsToSupport includes PDF417
    const formats=[
      Html5QrcodeSupportedFormats.PDF_417,
      Html5QrcodeSupportedFormats.CODE_128,
      Html5QrcodeSupportedFormats.QR_CODE,
      Html5QrcodeSupportedFormats.DATA_MATRIX
    ];
    log('Requesting back camera…');
    await html5QrCode.start(
      {facingMode:"environment"},
      {...config, formatsToSupport: formats},
      onScan,
      onError
    );
    log('✓ Camera running — point at PDF417 barcode');
  }catch(e){
    log('✗ Error: '+e.message);
    // Try without format filter if first attempt failed
    try{
      log('Retrying without format filter…');
      const html5QrCode2=new Html5Qrcode("reader");
      await html5QrCode2.start({facingMode:"environment"},{fps:10,qrbox:{width:280,height:120}},onScan,onError);
      log('✓ Camera running (no format filter)');
    }catch(e2){
      log('✗ Both attempts failed: '+e2.message);
    }
  }
}

window.addEventListener('load',()=>{
  if(!window.Html5Qrcode){log('✗ Library failed to load — check internet');return;}
  log('Library OK — starting…');
  start();
});
</script>
</body>
</html>
